<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Consultora · Barrett</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:system-ui,-apple-system,sans-serif;background:#f5f4f0;color:#1a1a1a;padding:2rem 1rem;}
.container{max-width:800px;margin:0 auto;}
.header{display:flex;align-items:center;gap:1rem;padding-bottom:1.25rem;border-bottom:1px solid #ddd;margin-bottom:1.5rem;flex-wrap:wrap;}
.header img{height:44px;}
.header-texto h1{font-size:17px;font-weight:600;}
.header-texto p{font-size:12px;color:#888;margin-top:2px;}
.login-card{background:#fff;border:1px solid #ddd;border-radius:12px;padding:2rem;max-width:380px;margin:3rem auto;}
.login-card h2{font-size:16px;font-weight:600;margin-bottom:1rem;}
.field{margin-bottom:.75rem;}
.field input{width:100%;padding:9px 12px;font-size:14px;border:1px solid #ccc;border-radius:8px;outline:none;}
.field input:focus{border-color:#888;}
.panel{display:none;}
.card{background:#fff;border:1px solid #ddd;border-radius:12px;padding:1.5rem;margin-bottom:1.5rem;}
.card h2{font-size:15px;font-weight:600;margin-bottom:1rem;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:.75rem;}
.form-row input{padding:9px 12px;font-size:14px;border:1px solid #ccc;border-radius:8px;outline:none;width:100%;}
.btn{font-size:13px;padding:8px 18px;border-radius:8px;border:none;cursor:pointer;}
.btn-primary{background:#1a1a1a;color:#fff;}
.btn-sm{font-size:12px;padding:5px 12px;border-radius:6px;border:1px solid #ddd;background:#fff;cursor:pointer;}
.enlace-result{background:#f0f9f0;border:1px solid #7bc67b;border-radius:8px;padding:12px 14px;margin-top:1rem;display:none;}
.enlace-result p{font-size:12px;color:#2d6a2d;margin-bottom:6px;font-weight:600;}
.enlace-url{font-size:12px;word-break:break-all;background:#fff;border:1px solid #ccc;border-radius:6px;padding:8px 10px;margin-bottom:8px;}
.err{font-size:12px;color:#c0392b;margin-top:.5rem;display:none;}
.tabs{display:flex;gap:4px;margin-bottom:1rem;}
.tab{font-size:13px;padding:6px 16px;border-radius:8px;border:1px solid #ddd;background:#fff;cursor:pointer;color:#666;}
.tab.activo{background:#1a1a1a;color:#fff;border-color:#1a1a1a;}
.tc{display:none;} .tc.v{display:block;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{text-align:left;padding:8px 10px;border-bottom:2px solid #eee;color:#666;font-size:11px;text-transform:uppercase;}
td{padding:9px 10px;border-bottom:1px solid #f0f0f0;vertical-align:top;}
.bp{font-size:11px;padding:2px 8px;border-radius:10px;background:#E5F0FA;color:#003D6B;}
.empty{text-align:center;color:#aaa;padding:2rem;font-size:13px;}
</style>
</head>

    <button class="btn btn-primary" style="width:100%" onclick="login()">Entrar</button>
    <div class="err" id="lerr">Contraseña incorrecta</div>
  </div>

  <div class="panel" id="panel">
    <div class="tabs">
      <button class="tab activo" onclick="tab('gen')">Generar enlace</button>
      <button class="tab" onclick="tab('resp')">Respuestas</button>
    </div>

    <div class="tc v" id="tc-gen">
      <div class="card">
        <h2>Nuevo enlace de un solo uso</h2>
        <div class="form-row">
          <input type="text" id="cnombre" placeholder="Nombre del cliente"/>
          <input type="email" id="cemail" placeholder="Correo del cliente"/>
        </div>
        <button class="btn btn-primary" onclick="generar()">Generar enlace</button>
        <div class="err" id="gerr"></div>
        <div class="enlace-result" id="er">
          <p>Enlace generado — válido para un solo uso</p>
          <input type="text" class="enlace-url" id="eu" readonly onclick="this.select()" style="cursor:pointer;width:100%;"/>
          <button class="btn-sm" onclick="copiar()">Copiar enlace</button>
        </div>
      </div>
    </div>

    <div class="tc" id="tc-resp">
      <div class="card">
        <h2>Respuestas recibidas</h2>
        <div id="rc"><div class="empty">Cargando...</div></div>
      </div>
    </div>
  </div>
</div>
<script>
var pwd="";
function login(){
  pwd=document.getElementById("pw").value;
  fetch("/.netlify/functions/listar-respuestas",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({password:pwd})})
  .then(function(r){if(r.status===401){document.getElementById("lerr").style.display="block";return null;}return r.json();})
  .then(function(d){if(!d)return;document.getElementById("lc").style.display="none";document.getElementById("panel").style.display="block";mostrarRespuestas(d.respuestas||[]);});
}
function tab(t){
  document.querySelectorAll(".tab").forEach(function(el,i){el.className="tab"+(["gen","resp"][i]===t?" activo":"");});
  document.querySelectorAll(".tc").forEach(function(el,i){el.className="tc"+(["gen","resp"][i]===t?" v":"");});
  if(t==="resp")cargarResp();
}
function generar(){
  var n=document.getElementById("cnombre").value.trim(),e=document.getElementById("cemail").value.trim();
  var err=document.getElementById("gerr");
  if(!n||!e){err.textContent="Ingresa nombre y correo.";err.style.display="block";return;}
  err.style.display="none";
  fetch("/.netlify/functions/generar-token",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({password:pwd,nombre:n,email:e})})
  .then(function(r){return r.json();}).then(function(d){
    if(d.error){err.textContent=d.error;err.style.display="block";return;}
    document.getElementById("eu").value=d.enlace;
    document.getElementById("er").style.display="block";
    document.getElementById("cnombre").value="";document.getElementById("cemail").value="";
  });
}
function copiar(){
  var inp=document.getElementById("eu");
  inp.select();
  try{
    navigator.clipboard.writeText(inp.value).then(function(){alert("Copiado!");}).catch(function(){
      document.execCommand("copy");alert("Copiado!");
    });
  }catch(e){document.execCommand("copy");alert("Copiado!");}
}
function cargarResp(){
  document.getElementById("rc").innerHTML='<div class="empty">Cargando...</div>';
  fetch("/.netlify/functions/listar-respuestas",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({password:pwd})})
  .then(function(r){return r.json();}).then(function(d){mostrarRespuestas(d.respuestas||[]);});
}
function mostrarRespuestas(resp){
  if(!resp.length){document.getElementById("rc").innerHTML='<div class="empty">Aun no hay respuestas.</div>';return;}
  var h='<table><thead><tr><th>Nombre</th><th>Fecha</th><th>Patron</th><th style="text-align:center">Base</th><th style="text-align:center">Evol</th><th style="text-align:center">Prop</th></tr></thead><tbody>';
  resp.forEach(function(r){
    h+='<tr><td><strong>'+r.nombre+'</strong><br><span style="color:#888;font-size:11px">'+r.email+'</span></td>'+
    '<td style="color:#666;white-space:nowrap">'+r.fecha+'</td>'+
    '<td><span class="bp">'+r.patron+'</span></td>'+
    '<td style="text-align:center;font-weight:700;color:#F4CC20">'+r.base_count+'</td>'+
    '<td style="text-align:center;font-weight:700;color:#8EC63F">'+r.evolucion_count+'</td>'+
    '<td style="text-align:center;font-weight:700;color:#662D91">'+r.proposito_count+'</td></tr>';
  });
  h+='</tbody></table>';
  document.getElementById("rc").innerHTML=h;
}
</script>
</body>
</html>
